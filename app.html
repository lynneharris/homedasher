<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeDasher — On-Demand Household Help</title>
  <meta name="description" content="Tired of raiding the clean laundry pile? HomeDasher sends skilled help to your home — working from your to-do list, not ours. Book in minutes, come home ready to reclaim your evenings." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal: #3A707F;
      --teal-dark: #2d5a67;
      --teal-deep: #1e3d45;
      --teal-light: #d4eaee;
      --teal-pale: #f0f8fa;
      --yellow: #FED807;
      --yellow-dark: #e6c000;
      --red: #E02529;
      --cream: #fefefe;
      --stone: #f7f8f6;
      --ink: #1a2426;
      --slate: #3d5259;
      --muted: #6b8289;
      --border: #e0e8ea;
      --white: #ffffff;
      --display: 'Bangers', cursive;
      --sans: 'Montserrat', system-ui, sans-serif;
      --radius: 14px;
      --shadow: 0 4px 24px rgba(58,112,127,0.08);
      --shadow-lg: 0 12px 48px rgba(58,112,127,0.14);
    }

    html { scroll-behavior: smooth; }
    body { font-family: var(--sans); background: var(--cream); color: var(--ink); min-height: 100vh; overflow-x: hidden; }

    /* HEADER */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(250,250,248,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border); padding: 0 32px;
      height: 64px; display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-family: var(--display); font-size: 28px; letter-spacing: 2px; line-height: 1; color: var(--teal); text-decoration: none; }
    .logo .home { color: var(--teal); }
    .logo .dasher { color: var(--teal-deep); }
    .nav-links { display: flex; align-items: center; gap: 4px; }
    .nav-link { font-size: 14px; font-weight: 500; color: var(--muted); background: none; border: none; cursor: pointer; padding: 8px 16px; border-radius: 8px; transition: all 0.2s; font-family: var(--sans); text-decoration: none; display: inline-block; }
    .nav-link:hover { color: var(--teal); background: var(--teal-pale); }
    .nav-cta { font-size: 14px; font-weight: 600; background: var(--teal); color: white; border: none; cursor: pointer; padding: 9px 20px; border-radius: 100px; font-family: var(--sans); transition: all 0.2s; margin-left: 8px; text-decoration: none; }
    .nav-cta:hover { background: var(--teal-dark); transform: translateY(-1px); }
    .nav-login { font-size: 13px; font-weight: 500; color: var(--muted); background: none; border: 1px solid var(--border); cursor: pointer; padding: 7px 14px; border-radius: 8px; transition: all 0.2s; font-family: var(--sans); margin-left: 4px; display: inline-flex; align-items: center; gap: 6px; }
    .nav-login:hover { color: var(--teal); border-color: var(--teal); background: var(--teal-pale); }
    .nav-hamburger { display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 4px; }
    .nav-hamburger span { display: block; width: 22px; height: 2px; background: var(--teal); border-radius: 2px; transition: all 0.2s; }
    @media (max-width: 720px) {
      .nav-links { display: none; position: fixed; top: 64px; left: 0; right: 0; background: rgba(250,250,248,0.98); backdrop-filter: blur(12px); flex-direction: column; align-items: stretch; gap: 0; border-bottom: 1px solid var(--border); padding: 12px 16px 20px; z-index: 99; }
      .nav-links.open { display: flex; }
      .nav-links .nav-link { padding: 12px 16px; border-radius: 8px; }
      .nav-links .nav-cta { margin: 8px 0 4px; padding: 12px; border-radius: 10px; text-align: center; display: block; }
      .nav-links .nav-login { margin: 4px 0; padding: 11px 16px; border-radius: 8px; justify-content: center; }
      .nav-hamburger { display: flex; }
    }

    /* HERO */
    .hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 100px 24px 60px; position: relative; overflow: hidden; }
    .hero-bg { position: absolute; inset: 0; z-index: 0; background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(58,112,127,0.10) 0%, transparent 70%), radial-gradient(ellipse 40% 40% at 90% 80%, rgba(58,112,127,0.06) 0%, transparent 60%), var(--cream); }
    .hero-content { position: relative; z-index: 1; text-align: center; max-width: 680px; }
    .hero-eyebrow { display: inline-flex; align-items: center; gap: 8px; background: var(--teal-pale); border: 1px solid var(--teal-light); color: var(--teal-dark); font-size: 11px; font-weight: 600; padding: 6px 14px; border-radius: 100px; margin-bottom: 28px; letter-spacing: 0.08em; text-transform: uppercase; font-family: var(--sans); }
    .hero-eyebrow::before { content: '✦'; font-size: 10px; }
    h1 { font-family: var(--display); font-size: clamp(44px, 6.5vw, 76px); line-height: 1.05; color: var(--ink); letter-spacing: 2px; margin-bottom: 24px; }
    h1 em { color: var(--teal); font-style: normal; position: relative; display: inline-block; }
    h1 em::after { content: ''; position: absolute; bottom: 4px; left: 0; right: 0; height: 4px; background: var(--yellow); border-radius: 2px; }
    .hero-sub { font-size: 17px; font-weight: 400; color: var(--slate); line-height: 1.7; margin-bottom: 40px; max-width: 520px; margin-left: auto; margin-right: auto; }
    .hero-cta { display: inline-flex; align-items: center; gap: 10px; background: var(--teal); color: white; font-family: var(--sans); font-size: 15px; font-weight: 600; padding: 16px 36px; border-radius: 100px; border: none; cursor: pointer; box-shadow: 0 8px 28px rgba(58,112,127,0.30); transition: all 0.25s; letter-spacing: 0.03em; }
    .hero-cta:hover { background: var(--teal-dark); transform: translateY(-2px); box-shadow: 0 12px 36px rgba(58,112,127,0.40); }
    .hero-cta:active { transform: translateY(0); }
    .hero-cta-arrow { font-size: 18px; transition: transform 0.2s; }
    .hero-cta:hover .hero-cta-arrow { transform: translateX(4px); }
    .trust-row { display: flex; align-items: center; justify-content: center; gap: 32px; margin-top: 56px; flex-wrap: wrap; }
    .trust-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); font-weight: 400; }
    .trust-icon { color: var(--teal); font-size: 14px; font-weight: 700; }

    /* MAIN */
    .main { max-width: 720px; margin: 0 auto; padding: 0 24px 80px; }

    /* CARDS */
    .card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 36px; margin-bottom: 24px; animation: fadeUp 0.4s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .card-title { font-family: var(--display); font-size: 22px; color: var(--teal-deep); margin-bottom: 4px; }
    .card-sub { font-size: 14px; color: var(--muted); margin-bottom: 24px; }

    /* FORMS */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field.span2 { grid-column: span 2; }
    label { font-size: 13px; font-weight: 500; color: var(--slate); letter-spacing: 0.02em; }
    input, textarea, select { padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px; font-family: var(--sans); font-size: 15px; color: var(--ink); background: var(--stone); outline: none; transition: all 0.2s; width: 100%; }
    input:focus, textarea:focus, select:focus { border-color: var(--teal); background: white; box-shadow: 0 0 0 3px rgba(58,112,127,0.08); }
    textarea { resize: vertical; min-height: 80px; }
    .pref-toggle { display: flex; gap: 10px; }
    .pref-btn { flex: 1; padding: 11px; border-radius: 10px; cursor: pointer; border: 1px solid var(--border); background: var(--stone); font-family: var(--sans); font-size: 14px; font-weight: 500; color: var(--muted); transition: all 0.2s; text-align: center; }
    .pref-btn.active { border-color: var(--teal); background: var(--teal-pale); color: var(--teal-dark); }
    .duration-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .dur-btn { padding: 10px 6px; border-radius: 10px; cursor: pointer; border: 1px solid var(--border); background: var(--stone); font-family: var(--sans); font-size: 14px; font-weight: 500; color: var(--muted); transition: all 0.2s; text-align: center; }
    .dur-btn.active { border-color: var(--teal); background: var(--teal-pale); color: var(--teal-dark); }
    .dur-btn small { display: block; font-size: 12px; font-weight: 400; color: var(--muted); margin-top: 2px; }
    .dur-btn.active small { color: var(--teal); }
    .price-display { background: linear-gradient(135deg, var(--teal-pale), white); border: 1px solid var(--teal-light); border-radius: 12px; padding: 16px 20px; margin-top: 16px; display: flex; justify-content: space-between; align-items: center; }
    .price-label { font-size: 14px; color: var(--muted); }
    .price-amount { font-family: var(--display); font-size: 28px; color: var(--teal-deep); }
    .price-note { font-size: 12px; color: var(--teal); margin-top: 2px; }
    .divider { height: 1px; background: var(--border); margin: 24px 0; }

    /* STRIPE */
    #stripe-card-element { padding: 13px 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--stone); transition: all 0.2s; }
    #stripe-card-element.focused { border-color: var(--teal); background: white; }
    .promo-row { display: flex; gap: 10px; }
    .promo-row input { flex: 1; }
    .promo-apply { padding: 12px 20px; border-radius: 10px; background: var(--stone); border: 1px solid var(--border); font-family: var(--sans); font-size: 14px; font-weight: 500; color: var(--slate); cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .promo-apply:hover { border-color: var(--teal); color: var(--teal); }
    .promo-success { font-size: 13px; color: #16a34a; margin-top: 6px; }
    .promo-error { font-size: 13px; color: #dc2626; margin-top: 6px; }
    .submit-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--teal), var(--teal-dark)); color: white; font-family: var(--sans); font-size: 17px; font-weight: 500; border: none; border-radius: 100px; cursor: pointer; box-shadow: 0 8px 24px rgba(58,112,127,0.3); transition: all 0.25s; margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .submit-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(58,112,127,0.4); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* SUCCESS */
    .success-card { text-align: center; padding: 48px 36px; }
    .success-icon { width: 72px; height: 72px; border-radius: 50%; background: linear-gradient(135deg, var(--teal), var(--teal-dark)); color: white; font-size: 32px; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; box-shadow: 0 8px 24px rgba(58,112,127,0.3); }
    .success-title { font-family: var(--display); font-size: 30px; color: var(--ink); margin-bottom: 8px; }
    .success-sub { font-size: 16px; color: var(--muted); line-height: 1.6; margin-bottom: 32px; }
    .success-detail { background: var(--teal-pale); border: 1px solid var(--teal-light); border-radius: 12px; padding: 20px 24px; text-align: left; margin-bottom: 24px; }
    .success-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; }
    .success-row-label { color: var(--muted); }
    .success-row-val { color: var(--teal-deep); font-weight: 500; }
    .stars { display: flex; gap: 8px; justify-content: center; margin: 16px 0; }
    .star { font-size: 36px; cursor: pointer; transition: transform 0.15s; filter: grayscale(1) opacity(0.4); }
    .star.active { filter: none; transform: scale(1.15); }
    .star:hover { transform: scale(1.2); }
    .magic-card { max-width: 440px; margin: 0 auto; }
    .error-msg { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; border-radius: 10px; padding: 12px 16px; font-size: 14px; margin-top: 12px; }

    /* STEP INDICATOR */
    .steps { display: flex; align-items: center; justify-content: center; gap: 0; margin-bottom: 32px; padding-top: 88px; }
    .step { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .step-dot { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); background: white; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--muted); transition: all 0.3s; }
    .step.active .step-dot { border-color: var(--teal); background: var(--teal); color: white; }
    .step.done .step-dot { border-color: var(--teal); background: var(--teal-pale); color: var(--teal); }
    .step-label { font-size: 11px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
    .step.active .step-label { color: var(--teal); }
    .step-line { width: 48px; height: 2px; background: var(--border); margin-bottom: 18px; transition: background 0.3s; }
    .step-line.done { background: var(--teal-light); }

    /* CONTENT SECTIONS */
    .content-section { padding: 80px 24px; }
    .alt-bg { background: var(--stone); }
    .section-inner { max-width: 860px; margin: 0 auto; }
    .section-inner.center-text { text-align: center; }
    .section-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--teal); margin-bottom: 12px; font-family: var(--sans); }
    .section-title { font-family: var(--display); font-size: clamp(26px, 4vw, 40px); color: var(--teal-deep); line-height: 1.15; margin-bottom: 20px; letter-spacing: 1.5px; }
    .section-body { font-size: 16px; color: var(--slate); line-height: 1.75; margin-bottom: 16px; max-width: 680px; font-weight: 400; }
    .callout-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-top: 40px; }
    .callout-item { background: white; border: 1px solid var(--border); border-radius: 16px; padding: 24px; display: flex; flex-direction: column; gap: 12px; }
    .callout-icon { font-size: 28px; }
    .callout-text { font-size: 14px; color: var(--slate); line-height: 1.6; }
    .steps-list { display: flex; flex-direction: column; gap: 32px; margin-top: 40px; }
    .step-item { display: flex; gap: 24px; align-items: flex-start; }
    .step-num { width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0; background: linear-gradient(135deg, var(--teal), var(--teal-dark)); color: white; font-family: var(--display); font-size: 20px; display: flex; align-items: center; justify-content: center; }
    .step-content { padding-top: 6px; }
    .step-heading { font-size: 18px; font-weight: 700; color: var(--teal-deep); margin-bottom: 8px; }
    .step-desc { font-size: 15px; color: var(--slate); line-height: 1.65; }
    .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-top: 32px; }
    .service-card { background: white; border: 1px solid var(--border); border-radius: 16px; padding: 20px; transition: all 0.2s; }
    .service-card:hover { border-color: var(--teal); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(58,112,127,0.1); }
    .service-icon { font-size: 24px; margin-bottom: 10px; }
    .service-name { font-size: 15px; font-weight: 700; color: var(--teal-deep); margin-bottom: 6px; }
    .service-desc { font-size: 13px; color: var(--muted); line-height: 1.5; }
    .specialty-note { margin-top: 28px; padding: 20px 24px; background: white; border: 1px solid var(--border); border-radius: 14px; font-size: 14px; color: var(--slate); line-height: 1.6; }
    .specialty-note a { color: var(--teal); text-decoration: none; font-weight: 600; }
    .pricing-card { max-width: 480px; margin: 40px auto 0; background: white; border: 1px solid var(--border); border-radius: 24px; padding: 40px; box-shadow: 0 8px 40px rgba(58,112,127,0.08); }
    .price-amount { font-family: var(--display); font-size: 64px; color: var(--teal-deep); line-height: 1; margin-bottom: 12px; }
    .price-unit { font-size: 28px; color: var(--muted); }
    .price-desc { font-size: 15px; color: var(--slate); margin-bottom: 24px; line-height: 1.5; }
    .price-features { display: flex; flex-direction: column; gap: 10px; text-align: left; }
    .price-feature { font-size: 14px; color: var(--slate); display: flex; gap: 8px; }

    /* TASK SELECTOR */
    .ts-row { display: flex; align-items: center; gap: 10px; padding: 13px 0; border-bottom: 1px solid var(--border); transition: opacity 0.2s; }
    .ts-row.inactive { opacity: 0.45; }
    .ts-checkbox { width: 20px; height: 20px; border-radius: 5px; border: 1.5px solid var(--border); background: white; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: background 0.15s, border-color 0.15s; }
    .ts-checkbox.checked { background: var(--teal); border-color: var(--teal); }
    .ts-checkmark { width: 11px; height: 8px; display: none; }
    .ts-checkbox.checked .ts-checkmark { display: block; }
    .ts-label { flex: 1; font-size: 15px; color: var(--ink); cursor: pointer; user-select: none; }
    .ts-stepper { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .ts-btn { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--border); background: white; color: var(--ink); font-size: 18px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.12s; font-family: var(--sans); }
    .ts-btn:hover:not(:disabled) { background: var(--stone); }
    .ts-btn:disabled { opacity: 0.25; cursor: default; }
    .ts-time { font-size: 14px; font-weight: 500; color: var(--ink); min-width: 46px; text-align: center; }
    .ts-total-bar { margin-top: 20px; background: var(--teal-pale); border: 1px solid var(--teal-light); border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; }
    .ts-total-label { font-size: 14px; color: var(--muted); }
    .ts-total-time { font-family: var(--display); font-size: 26px; color: var(--teal-deep); }
    .ts-total-breakdown { font-size: 12px; color: var(--teal); margin-top: 2px; text-align: right; }
    .proceed-btn { width: 100%; margin-top: 16px; background: var(--yellow); color: var(--ink); font-family: var(--sans); font-size: 15px; font-weight: 700; padding: 15px; border-radius: 100px; border: none; cursor: pointer; box-shadow: 0 6px 20px rgba(254,216,7,0.35); transition: all 0.25s; letter-spacing: 0.03em; }
    .proceed-btn:hover:not(:disabled) { transform: translateY(-1px); background: var(--yellow-dark); box-shadow: 0 8px 28px rgba(254,216,7,0.45); }
    .proceed-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* INSTRUCTIONS BRANCH */
    .branch-summary { background: var(--stone); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 24px; }
    .branch-summary-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
    .branch-summary-row { display: flex; justify-content: space-between; font-size: 14px; color: var(--slate); padding: 3px 0; }
    .branch-summary-total { display: flex; justify-content: space-between; font-size: 15px; font-weight: 600; color: var(--teal-deep); border-top: 1px solid var(--border); margin-top: 8px; padding-top: 8px; }
    .branch-question { font-size: 18px; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
    .branch-sub { font-size: 14px; color: var(--muted); margin-bottom: 20px; }
    .branch-option { display: flex; align-items: center; padding: 16px; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; cursor: pointer; background: white; font-size: 15px; font-weight: 500; color: var(--ink); transition: all 0.15s; }
    .branch-option:hover { border-color: var(--teal); background: var(--teal-pale); color: var(--teal-dark); }
    .branch-option.primary { border: 2px solid var(--teal); }

    /* CATEGORY DETAIL */
    .cd-progress { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .cd-progress-bar { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .cd-progress-fill { height: 100%; background: var(--teal); border-radius: 2px; transition: width 0.3s; }
    .cd-progress-label { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .cd-category-label { font-size: 11px; font-weight: 700; color: var(--teal); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
    .cd-title { font-family: var(--display); font-size: 22px; color: var(--teal-deep); margin-bottom: 16px; letter-spacing: 1px; }
    .cd-included { background: var(--teal-pale); border: 1px solid var(--teal-light); border-radius: 10px; padding: 12px 14px; margin-bottom: 20px; }
    .cd-included-label { font-size: 11px; font-weight: 700; color: var(--teal); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    .cd-included-item { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; color: var(--slate); padding: 3px 0; }
    .cd-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--teal); margin-top: 7px; flex-shrink: 0; }
    .cd-section { font-size: 14px; font-weight: 600; color: var(--slate); margin: 16px 0 10px; }
    .cd-stepper-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .cd-count { font-size: 17px; font-weight: 600; color: var(--ink); min-width: 24px; text-align: center; }
    .cd-location-fields { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
    .cd-location-row { display: flex; align-items: center; gap: 10px; }

// ── HELPERS ──
function fmtTime(min) {
  if (!min || min === 0) return '—';
  if (min < 60) return min + ' min';
  const h = Math.floor(min / 60), m = min % 60;
  return m === 0 ? h + ' hr' : h + ' hr ' + m + ' min';
}
function fmtDuration(hrs) {
  if (hrs < 1) {
    return Math.round(hrs * 60) + ' min';
  }
  const h = Math.floor(hrs);
  const m = Math.round((hrs - h) * 60);
  return m === 0 ? h + ' hr' + (h !== 1 ? 's' : '') : h + ' hr ' + m + ' min';
}
function totalMinutes() { return Object.values(state.taskTimes).reduce((s, v) => s + (v || 0), 0); }
function selectedCats() { return CATS.filter(c => (state.taskTimes[c.id] || 0) > 0); }

// ── TASK SELECTOR ──
function renderTaskSelect() {
  const total = totalMinutes();
  const breakdown = CATS.filter(c => (state.taskTimes[c.id]||0) > 0)
    .map(c => c.label.split(' ')[0] + ' ' + fmtTime(state.taskTimes[c.id])).join(' · ');

  const elements = stripe.elements();

  const code = document.getElementById('promo-input').value.trim();

  const msg = document.getElementById('promo-msg');

// ── TASK SELECTOR ACTIONS ──
window.tsToggle = (id) => {
  state.taskTimes[id] = (state.taskTimes[id] || 0) > 0 ? 0 : 30;
  tsUpdateRow(id);
  tsUpdateTotal();
};
window.tsAdjust = (id, delta) => {
  state.taskTimes[id] = Math.max(0, Math.min(240, (state.taskTimes[id] || 0) + delta));
  tsUpdateRow(id);
  tsUpdateTotal();
};
function tsUpdateRow(id) {
  const mins = state.taskTimes[id] || 0;
  const active = mins > 0;
  const row = document.getElementById('ts-row-' + id);
  const cb  = document.getElementById('ts-cb-' + id);
  const timeEl = document.getElementById('ts-time-' + id);
  const minus = document.getElementById('ts-minus-' + id);
  const plus  = document.getElementById('ts-plus-' + id);
  if (row) row.className = 'ts-row' + (active ? '' : ' inactive');
  if (cb)  cb.className  = 'ts-checkbox' + (active ? ' checked' : '');
  if (timeEl) timeEl.textContent = mins > 0 ? fmtTime(mins) : '—';
  if (minus) minus.disabled = mins <= 0;
  if (plus)  plus.disabled  = mins >= 240;
}
function tsUpdateTotal() {
  const total = totalMinutes();
  const el = document.getElementById('ts-total');
  const bd = document.getElementById('ts-breakdown');
  const btn = document.getElementById('ts-next');
  if (el) el.textContent = total > 0 ? fmtTime(total) : '0 min';
  if (bd) bd.textContent = CATS.filter(c => (state.taskTimes[c.id]||0) > 0).map(c => c.label.split(' ')[0] + ' ' + fmtTime(state.taskTimes[c.id])).join(' · ');
  if (btn) btn.disabled = total === 0;
}
window.goToInstructionsBranch = () => {
  const total = totalMinutes();
  if (total > 0) state.duration = Math.max(0.5, Math.ceil((total / 60) * 4) / 4);
  state.screen = 'instructions-branch';
  render();
};
window.goToInstructions = () => {
  state.instructionIdx = 0;
  state.screen = 'cat-detail';
  render();
};
window.catDetailNext = () => {
  const total = selectedCats().length;
  if (state.instructionIdx + 1 < total) {
    state.instructionIdx++;
    render();
  } else {
    goToBook();
  }
};
window.catDetailBack = () => {
  if (state.instructionIdx > 0) {
    state.instructionIdx--;
    render();
  } else {
    state.screen = 'instructions-branch';
    render();
  }
};
window.adjustBaths = (delta) => {
  if (!state.catDetails['cleaning']) state.catDetails['cleaning'] = {};
  const d = state.catDetails['cleaning'];
  // Save any already-typed location values before touching the DOM
  document.querySelectorAll('.cd-location-row input').forEach((inp, i) => {
    if (!d.bathLocations) d.bathLocations = [];
    d.bathLocations[i] = inp.value;
  });
  d.bathCount = Math.max(1, Math.min(8, (d.bathCount || 1) + delta));
  // Targeted update — rebuild only the stepper count, button states, and location fields
  const countEl = document.querySelector('.cd-count');
  if (countEl) countEl.textContent = d.bathCount;
  const btns = document.querySelectorAll('.cd-stepper-row .ts-btn');
  if (btns[0]) btns[0].disabled = d.bathCount <= 1;
  if (btns[1]) btns[1].disabled = d.bathCount >= 8;
  const fieldsEl = document.querySelector('.cd-location-fields');
  if (fieldsEl) {
    let html = '';
    for (let i = 1; i <= d.bathCount; i++) {
      const val = (d.bathLocations && d.bathLocations[i-1]) || '';
      html += `<div class="cd-location-row">
        <div class="cd-location-num">Bathroom ${i}</div>
        <input type="text" placeholder="e.g. upstairs hall, master en suite" value="${val}"
          oninput="setBathLocation(${i-1}, this.value)"
          style="flex:1;padding:9px 12px;border:1px solid var(--border);border-radius:10px;font-family:var(--sans);font-size:14px;background:var(--stone);outline:none;color:var(--ink);" />
      </div>`;
    }
    fieldsEl.innerHTML = html;
  }
};
window.setBathLocation = (idx, val) => {
  if (!state.catDetails['cleaning']) state.catDetails['cleaning'] = {};
  if (!state.catDetails['cleaning'].bathLocations) state.catDetails['cleaning'].bathLocations = [];
  state.catDetails['cleaning'].bathLocations[idx] = val;
};
window.toggleTowels = () => {
  if (!state.catDetails['cleaning']) state.catDetails['cleaning'] = {};
  state.catDetails['cleaning'].towels = !state.catDetails['cleaning'].towels;
  const cb = document.getElementById('towels-cb');
  if (cb) cb.className = 'ts-checkbox' + (state.catDetails['cleaning'].towels ? ' checked' : '');
};
window.setCatNote = (catId, val) => {
  if (!state.catDetails[catId]) state.catDetails[catId] = {};
  state.catDetails[catId].notes = val;
};
window.triggerPhotoUpload = (catId) => {
  const input = document.getElementById('photo-upload-' + catId);
  if (input) input.click();
};

// ── SAVE BOOKING FIELDS ──
// Call before any render() that happens while the booking form is visible,
// so typed values aren't lost when the form rebuilds.
function saveBookingFields() {
  if (state.screen !== 'book') return;
  const get = (id) => document.getElementById(id)?.value.trim() || '';
  if (get('name'))    state._savedName    = get('name');
  if (get('email'))   state._savedEmail   = get('email');
  if (get('phone'))   state._savedPhone   = get('phone');
  if (get('address')) state._savedAddress = get('address');
  if (get('notes'))   state.notes         = get('notes');
  const ad = get('access-details'); if (ad) state.accessDetails = ad;
  const pn = get('pet-notes');      if (pn) state.petNotes      = pn;
}

// Patch renderBook to restore saved field values into the customer object
// so the input value="" attributes get repopulated after a re-render.
function saveAndRender() {
  saveBookingFields();
  // Temporarily patch state.customer so renderBook picks up the saved values
  state.customer = {
    name:    state._savedName    || state.customer?.name    || '',
    email:   state._savedEmail   || state.customer?.email   || '',
    phone:   state._savedPhone   || state.customer?.phone   || '',
    address: state._savedAddress || state.customer?.address || '',
  };
  render();
}

// ── NAV ACTIONS ──
window.startBooking  = () => { state.screen = 'task-select'; render(); };
window.showMagicLink = () => { state.screen = 'magic'; render(); };
window.goToBook      = () => { state.screen = 'book'; render(); };
window.setPref       = (p) => { state.contactPref = p; if (state.screen === 'book') saveAndRender(); else render(); };
window.setDuration   = (d) => { state.duration = d; if (state.screen === 'book') saveAndRender(); else render(); };
window.setRating     = (r) => { state.rating = r; render(); };
window.setAccess     = (m) => { state.accessMethod = m; state.arrivalPreference = null; saveAndRender(); };
window.setArrival    = (p) => { state.arrivalPreference = p; saveAndRender(); };
window.setPets       = (v) => { state.hasPets = v; saveAndRender(); };
window.applyPromo    = applyPromo;
window.goToRate      = () => { state.screen = 'rate'; render(); };

window.goToPayment = () => {
  saveBookingFields();
  const name    = document.getElementById('name')?.value.trim()    || state._savedName    || '';
  const email   = document.getElementById('email')?.value.trim()   || state._savedEmail   || '';
  const address = document.getElementById('address')?.value.trim() || state._savedAddress || '';
  const errEl   = document.getElementById('book-error');
  if (!name || !email || !address) { errEl.innerHTML = '<div class="error-msg">Please fill in your name, email, and address.</div>'; return; }
  if (!state.date)  { errEl.innerHTML = '<div class="error-msg">Please select a date.</div>'; return; }
  if (!state.time)  { errEl.innerHTML = '<div class="error-msg">Please select a start time.</div>'; return; }
  if (!state.accessMethod) { errEl.innerHTML = '<div class="error-msg">Please let us know how your HomeDasher should access your home.</div>'; return; }
  if ((state.accessMethod === 'someone_home' || state.accessMethod === 'buzzer') && !state.arrivalPreference) { errEl.innerHTML = '<div class="error-msg">Please let us know how your HomeDasher should announce their arrival.</div>'; return; }
  if (state.hasPets === null) { errEl.innerHTML = '<div class="error-msg">Please let us know if you have any pets.</div>'; return; }
  state.accessDetails = document.getElementById('access-details')?.value.trim() || state.accessDetails;
  state.petNotes = document.getElementById('pet-notes')?.value.trim() || state.petNotes;
  state.notes = document.getElementById('notes')?.value.trim() || '';
  state.bookingDetails = { name, email, phone: document.getElementById('phone')?.value.trim(), address, date: state.date, time: state.time, notes: state.notes };
  state.screen = 'payment';
  render();
};

window.submitPayment = async () => {
  const btn = document.getElementById('pay-btn');
  const btnText = document.getElementById('pay-btn-text');
  const errEl = document.getElementById('pay-error');
  btn.disabled = true;
  btnText.textContent = 'Processing…';
  try {
    const { paymentMethod, error } = await stripe.createPaymentMethod({ type: 'card', card: cardElement, billing_details: { name: state.bookingDetails.name, email: state.bookingDetails.email } });
    if (error) {
      document.getElementById('stripe-error').textContent = error.message;
      document.getElementById('stripe-error').style.display = 'block';
      btn.disabled = false;
      btnText.textContent = `Pay $${state.duration * 50} & confirm booking`;
      return;
    }
    const res = await fetch('/api/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ...state.bookingDetails, taskTimes: state.taskTimes, catDetails: state.catDetails, contactPreference: state.contactPref, duration: state.duration, paymentMethodId: paymentMethod.id, promoCode: state.promoCode || null, referralCode: state.referralCode || null, accessMethod: state.accessMethod || null, arrivalPreference: state.arrivalPreference || null, accessDetails: state.accessDetails || null, hasPets: state.hasPets || false, petNotes: state.petNotes || null }),
    });
    const data = await res.json();
    if (!res.ok) { errEl.innerHTML = `<div class="error-msg">${data.error || 'Payment failed. Please try again.'}</div>`; btn.disabled = false; btnText.textContent = `Pay $${state.duration * 50} & confirm booking`; return; }
    state.booking = data;
    state.screen = 'success';
    render();
  } catch (err) {
    errEl.innerHTML = '<div class="error-msg">Something went wrong. Please try again.</div>';
    btn.disabled = false;
    btnText.textContent = `Pay $${state.duration * 50} & confirm booking`;
  }
};

window.submitRating = async () => {
  if (!state.rating) return;
  const feedback = document.getElementById('feedback')?.value || '';
  try {
    await fetch('/api/rate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ bookingId: state.booking?.bookingId, rating: state.rating, feedback }) });
    document.querySelector('.card').innerHTML = `<div style="text-align:center;padding:20px 0"><div style="font-size:48px;margin-bottom:16px">${state.rating >= 4 ? '🌟' : '🙏'}</div><div class="card-title">${state.rating >= 4 ? 'Thank you so much!' : 'Thank you for the feedback'}</div><p style="color:var(--muted);margin-top:8px">${state.rating >= 4 ? "We're so glad you had a great experience!" : 'We appreciate your honesty and will use this to improve.'}</p><br><button style="margin-top:16px;background:none;border:none;color:var(--teal);cursor:pointer;font-family:var(--sans);font-size:14px;font-weight:500;text-decoration:underline" onclick="startBooking()">Book again</button></div>`;
  } catch(e) {}
};

window.sendMagicLink = async () => {
  const email = document.getElementById('magic-email')?.value.trim();
  const phone = document.getElementById('magic-phone')?.value.trim();
  const msg = document.getElementById('magic-msg');
  if (!email && !phone) { msg.innerHTML = '<div class="error-msg">Please enter your email or phone number.</div>'; return; }
  try {
    await fetch('/api/magic-link', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, phone, preference: state.contactPref }) });
    msg.innerHTML = `<div class="promo-success" style="margin-top:16px;font-size:15px">✓ Link sent! Check your ${state.contactPref === 'sms' ? 'texts' : 'email'}.</div>`;
  } catch(e) { msg.innerHTML = '<div class="error-msg">Something went wrong. Please try again.</div>'; }
};

// ── MAGIC LINK TOKEN CHECK ──
async function checkMagicToken() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  if (!token) return;
  try {
    const res = await fetch(`/api/verify?token=${token}`);
    const data = await res.json();
    if (data.customer) { state.customer = data.customer; state.screen = 'task-select'; window.history.replaceState({}, '', '/app'); render(); }
  } catch(e) {}
}

// ── CALENDAR ──
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function renderCalendar() {
  const year = state.calYear, month = state.calMonth;
  const today = new Date(); today.setHours(0,0,0,0);
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const dayLabels = DAYS.map(d => `<div class="cal-day-label">${d}</div>`).join('');
  let cells = '';
  for (let i = 0; i < firstDay; i++) cells += `<div class="cal-day empty"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const thisDate = new Date(year, month, d);
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const disabled = thisDate < today || thisDate.getDay() === 0 || thisDate.getDay() === 6;
    const cls = `cal-day ${thisDate.getTime() === today.getTime() ? 'today' : ''} ${disabled ? 'disabled' : ''} ${state.date === dateStr ? 'selected' : ''}`.trim();
    cells += `<div class="${cls}" ${!disabled ? `onclick="selectDate('${dateStr}')"` : ''}>${d}</div>`;
  }
  return `<label style="font-size:13px;font-weight:500;color:var(--slate);display:block;margin-bottom:10px">Select a date</label>
    <div style="background:var(--stone);border:1px solid var(--border);border-radius:12px;padding:16px">
      <div class="cal-header">
        <button class="cal-nav" onclick="calNav(-1)">‹</button>
        <div class="cal-month">${MONTHS[month]} ${year}</div>
        <button class="cal-nav" onclick="calNav(1)">›</button>
      </div>
      <div class="cal-grid">${dayLabels}${cells}</div>
    </div>`;
}

function formatDateShort(d) {
  if (!d) return '';
  return new Date(d + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}
function formatDate(date, time) {
  if (!date) return '';
  return new Date(`${date}T${time}`).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', hour: 'numeric', minute: '2-digit' });
}

window.calNav = (dir) => {
  state.calMonth += dir;
  if (state.calMonth > 11) { state.calMonth = 0; state.calYear++; }
  if (state.calMonth < 0)  { state.calMonth = 11; state.calYear--; }
  const w = document.getElementById('calendar-widget');
  if (w) w.innerHTML = renderCalendar();
};

window.selectDate = async (dateStr) => {
  state.date = dateStr; state.time = null;
  const w = document.getElementById('calendar-widget');
  if (w) w.innerHTML = renderCalendar();
  const sf = document.getElementById('time-slots-field');
  if (sf) { sf.style.display = ''; sf.querySelector('label').innerHTML = `Available start times · <span style="color:var(--teal)">${formatDateShort(dateStr)}</span>`; sf.querySelector('#time-slots').innerHTML = '<div style="color:var(--muted);font-size:14px">Loading available times…</div>'; }
  try {
    const res = await fetch(`/api/availability?date=${dateStr}&duration=${state.duration}`);
    const data = await res.json();
    const slotsEl = document.getElementById('time-slots');
    if (!slotsEl) return;
    if (!data.slots || data.slots.length === 0) { slotsEl.innerHTML = '<div class="no-slots">No available times on this date. Please try another day.</div>'; return; }
    slotsEl.innerHTML = `<div class="time-slots-grid">${data.slots.map(s => `<button class="time-slot ${state.time === s.value ? 'selected' : ''}" onclick="selectTime('${s.value}')">${s.display}</button>`).join('')}</div>`;
  } catch (err) {
    const slotsEl = document.getElementById('time-slots');
    if (slotsEl) slotsEl.innerHTML = '<div class="no-slots">Couldn\'t load times. Please try again.</div>';
  }
};

window.selectTime = (value) => {
  state.time = value;
  document.querySelectorAll('.time-slot').forEach(el => el.classList.remove('selected'));
  event.target.classList.add('selected');
};

// ── MOBILE NAV ──
window.toggleMobileNav = () => { document.getElementById('main-nav')?.classList.toggle('open'); };
document.addEventListener('click', (e) => {
  const nav = document.getElementById('main-nav'), hb = document.getElementById('nav-hamburger');
  if (nav && hb && !nav.contains(e.target) && !hb.contains(e.target)) nav.classList.remove('open');
});

// ── INIT ──
checkMagicToken();
render();
</script>
