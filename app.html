<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeDasher — On-Demand Household Help</title>
  <meta name="description" content="Tired of raiding the clean laundry pile? HomeDasher sends skilled help to your home — working from your to-do list, not ours. Book in minutes, come home ready to reclaim your evenings." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Bangers&family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal: #3A707F;
      --teal-dark: #2d5a67;
      --teal-deep: #1e3d45;
      --teal-light: #d4eaee;
      --teal-pale: #f0f8fa;
      --yellow: #FED807;
      --yellow-dark: #e6c000;
      --red: #E02529;
      --cream: #fefefe;
      --stone: #f7f8f6;
      --ink: #1a2426;
      --slate: #3d5259;
      --muted: #6b8289;
      --border: #e0e8ea;
      --white: #ffffff;
      --display: 'Bangers', cursive;
      --sans: 'Montserrat', system-ui, sans-serif;
      --radius: 14px;
      --shadow: 0 4px 24px rgba(58,112,127,0.08);
      --shadow-lg: 0 12px 48px rgba(58,112,127,0.14);
    }

    html { scroll-behavior: smooth; }
    body { font-family: var(--sans); background: var(--cream); color: var(--ink); min-height: 100vh; overflow-x: hidden; }

    /* HEADER */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(250,250,248,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border); padding: 0 32px;
      height: 64px; display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-family: var(--display); font-size: 28px; letter-spacing: 0px; line-height: 1; color: var(--teal); text-decoration: none; display: inline-flex; align-items: center; gap: 10px; }
    .logo-img { height: 52px; width: auto; display: block; mix-blend-mode: multiply; }
    .logo .home { color: var(--teal); }
    .logo .dasher { color: var(--teal-deep); }
    .nav-links { display: flex; align-items: center; gap: 4px; }
    .nav-link { font-size: 14px; font-weight: 500; color: var(--muted); background: none; border: none; cursor: pointer; padding: 8px 16px; border-radius: 8px; transition: all 0.2s; font-family: var(--sans); text-decoration: none; display: inline-block; }
    .nav-link:hover { color: var(--teal); background: var(--teal-pale); }
    .nav-cta { font-size: 14px; font-weight: 600; background: var(--teal); color: white; border: none; cursor: pointer; padding: 9px 20px; border-radius: 100px; font-family: var(--sans); transition: all 0.2s; margin-left: 8px; text-decoration: none; }
    .nav-cta:hover { background: var(--teal-dark); transform: translateY(-1px); }
    .nav-login { font-size: 13px; font-weight: 500; color: var(--muted); background: none; border: 1px solid var(--border); cursor: pointer; padding: 7px 14px; border-radius: 8px; transition: all 0.2s; font-family: var(--sans); margin-left: 4px; display: inline-flex; align-items: center; gap: 6px; }
    .nav-login:hover { color: var(--teal); border-color: var(--teal); background: var(--teal-pale); }
    .nav-hamburger { display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 4px; }
    .nav-hamburger span { display: block; width: 22px; height: 2px; background: var(--teal); border-radius: 2px; transition: all 0.2s; }
    @media (max-width: 720px) {
      .nav-links { display: none; position: fixed; top: 64px; left: 0; right: 0; background: rgba(250,250,248,0.98); backdrop-filter: blur(12px); flex-direction: column; align-items: stretch; gap: 0; border-bottom: 1px solid var(--border); padding: 12px 16px 20px; z-index: 99; }
      .nav-links.open { display: flex; }
      .nav-links .nav-link { padding: 12px 16px; border-radius: 8px; }
      .nav-links .nav-cta { margin: 8px 0 4px; padding: 12px; border-radius: 10px; text-align: center; display: block; }
      .nav-links .nav-login { margin: 4px 0; padding: 11px 16px; border-radius: 8px; justify-content: center; }
      .nav-hamburger { display: flex; }
    }

    /* RIBBON DIVIDERS */
    .ribbon-wrap { line-height: 0; margin: 0; padding: 0; overflow: hidden; }
    .ribbon-wrap svg { width: 100%; height: 80px; display: block; }
    .ribbon-flip { transform: scaleX(-1); }
    @media (max-width: 600px) { .ribbon-wrap svg { height: 50px; } }

    /* GRADIENT TEXT */
    .gradient-title {
      background: linear-gradient(120deg, var(--teal-deep) 0%, var(--teal) 55%, #2a8a7a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* GRADIENT CARDS */
    .gradient-card { background: linear-gradient(135deg, var(--white) 0%, var(--teal-pale) 100%) !important; border: 1px solid var(--teal-light) !important; }
    .gradient-card:hover { border-color: var(--teal) !important; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(58,112,127,0.12); }

    /* HERO MESH */
    .hero-mesh { position: absolute; inset: 0; z-index: 0; background:
      radial-gradient(ellipse 60% 50% at 15% 60%, rgba(58,112,127,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 85% 30%, rgba(168,212,220,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 50% 100%, rgba(212,234,238,0.20) 0%, transparent 60%),
      var(--cream); }

    /* SECTION BACKGROUNDS */
    .problem-section { background: linear-gradient(135deg, #c8e8ee 0%, #e8f5f8 100%); }
    .how-section { background: white; }
    .services-section { background: var(--stone); }
    .pricing-section { background: white; }

    /* TRUST CHECKS */
    .trust-check { color: var(--teal); font-weight: 700; font-size: 14px; }

    /* FOOTER GRADIENT */
    footer { background: linear-gradient(135deg, var(--teal-deep) 0%, #152d33 100%); color: rgba(255,255,255,0.6); padding: 40px 32px; text-align: center; font-size: 13px; line-height: 2; }
    footer a { color: rgba(255,255,255,0.6); text-decoration: none; margin: 0 12px; }
    footer a:hover { color: white; }
    .footer-logo { font-family: var(--display); font-size: 22px; letter-spacing: 0px; color: white; margin-bottom: 12px; display: block; }

    /* HERO */
    .hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 100px 24px 40px; position: relative; overflow: hidden; }
    .hero-bg { position: absolute; inset: 0; z-index: 0; background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(58,112,127,0.10) 0%, transparent 70%), radial-gradient(ellipse 40% 40% at 90% 80%, rgba(58,112,127,0.06) 0%, transparent 60%), var(--cream); }
    .hero-content { position: relative; z-index: 1; text-align: center; max-width: 680px; }
    .hero-eyebrow { display: inline-flex; align-items: center; gap: 8px; background: var(--teal-pale); border: 1px solid var(--teal-light); color: var(--teal-dark); font-size: 11px; font-weight: 600; padding: 6px 14px; border-radius: 100px; margin-bottom: 28px; letter-spacing: 0.08em; text-transform: uppercase; font-family: var(--sans); }
    .hero-eyebrow::before { content: ''; font-size: 10px; }
    h1 { font-family: var(--display); font-size: clamp(44px, 6.5vw, 76px); line-height: 1.05; color: var(--ink); letter-spacing: 0px; margin-bottom: 24px; }
    h1 em { color: var(--teal); font-style: normal; position: relative; display: inline-block; }
    /* h1 em::after { content: ''; position: absolute; bottom: 4px; left: 0; right: 0; height: 4px; background: var(--yellow); border-radius: 2px; } */
    .hero-sub { font-size: 17px; font-weight: 400; color: var(--slate); line-height: 1.7; margin-bottom: 40px; max-width: 520px; margin-left: auto; margin-right: auto; }
    .hero-cta { display: inline-flex; align-items: center; gap: 10px; background: var(--teal); color: white; font-family: var(--sans); font-size: 15px; font-weight: 600; padding: 16px 36px; border-radius: 100px; border: none; cursor: pointer; box-shadow: 0 8px 28px rgba(58,112,127,0.30); transition: all 0.25s; letter-spacing: 0.03em; }
    .hero-cta:hover { background: var(--teal-dark); transform: translateY(-2px); box-shadow: 0 12px 36px rgba(58,112,127,0.40); }
    .hero-cta:active { transform: translateY(0); }
    .hero-cta-arrow { font-size: 18px; transition: transform 0.2s; }
    .hero-cta:hover .hero-cta-arrow { transform: translateX(4px); }
    .trust-row { display: flex; align-items: center; justify-content: center; gap: 32px; margin-top: 56px; flex-wrap: wrap; }
    .trust-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); font-weight: 400; }
    .trust-icon { color: var(--teal); font-size: 14px; font-weight: 700; }

    /* MAIN */
    .main { max-width: 720px; margin: 0 auto; padding: 0 24px 80px; }

    /* CARDS */
    .card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 36px; margin-bottom: 24px; animation: fadeUp 0.4s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .card-title { font-family: var(--display); font-size: 22px; color: var(--teal-deep); margin-bottom: 4px; }
    .card-sub { font-size: 14px; color: var(--muted); margin-bottom: 24px; }

    /* FORMS */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field.span2 { grid-column: span 2; }
    label { font-size: 13px; font-weight: 500; color: var(--slate); letter-spacing: 0.02em; }
    input, textarea, select { padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px; font-family: var(--sans); font-size: 15px; color: var(--ink); background: var(--stone); outline: none; transition: all 0.2s; width: 100%; }
    input:focus, textarea:focus, select:focus { border-color: var(--teal); background: white; box-shadow: 0 0 0 3px rgba(58,112,127,0.08); }
    textarea { resize: vertical; min-height: 80px; }
    .pref-toggle { display: flex; gap: 10px; }
    .pref-btn { flex: 1; padding: 11px; border-radius: 10px; cursor: pointer; border: 1px solid var(--border); background: var(--stone); font-family: var(--sans); font-size: 14px; font-weight: 500; color: var(--muted); transition: all 0.2s; text-align: center; }
    .pref-btn.active { border-color: var(--teal); background: var(--teal-pale); color: var(--teal-dark); }
    .duration-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .dur-btn { padding: 10px 6px; border-radius: 10px; cursor: pointer; border: 1px solid var(--border); background: var(--stone); font-family: var(--sans); font-size: 14px; font-weight: 500; color: var(--muted); transition: all 0.2s; text-align: center; }
    .dur-btn.active { border-color: var(--teal); background: var(--teal-pale); color: var(--teal-dark); }
    .dur-btn small { display: block; font-size: 12px; font-weight: 400; color: var(--muted); margin-top: 2px; }
    .dur-btn.active small { color: var(--teal); }
    .price-display { background: linear-gradient(135deg, var(--teal-pale), white); border: 1px solid var(--teal-light); border-radius: 12px; padding: 16px 20px; margin-top: 16px; display: flex; justify-content: space-between; align-items: center; }
    .price-label { font-size: 14px; color: var(--muted); }
    .price-amount { font-family: var(--display); font-size: 28px; color: var(--teal-deep); }
    .price-note { font-size: 12px; color: var(--teal); margin-top: 2px; }
    .divider { height: 1px; background: var(--border); margin: 24px 0; }

    /* STRIPE */
    #stripe-card-element { padding: 13px 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--stone); transition: all 0.2s; }
    #stripe-card-element.focused { border-color: var(--teal); background: white; }
    .promo-row { display: flex; gap: 10px; }
    .promo-row input { flex: 1; }
    .promo-apply { padding: 12px 20px; border-radius: 10px; background: var(--stone); border: 1px solid var(--border); font-family: var(--sans); font-size: 14px; font-weight: 500; color: var(--slate); cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .promo-apply:hover { border-color: var(--teal); color: var(--teal); }
    .promo-success { font-size: 13px; color: #16a34a; margin-top: 6px; }
    .promo-error { font-size: 13px; color: #dc2626; margin-top: 6px; }
    .submit-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--teal), var(--teal-dark)); color: white; font-family: var(--sans); font-size: 17px; font-weight: 500; border: none; border-radius: 100px; cursor: pointer; box-shadow: 0 8px 24px rgba(58,112,127,0.3); transition: all 0.25s; margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .submit-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(58,112,127,0.4); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* SUCCESS */
    .success-card { text-align: center; padding: 48px 36px; }
    .success-icon { width: 72px; height: 72px; border-radius: 50%; background: linear-gradient(135deg, var(--teal), var(--teal-dark)); color: white; font-size: 32px; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; box-shadow: 0 8px 24px rgba(58,112,127,0.3); }
    .success-title { font-family: var(--display); font-size: 30px; color: var(--ink); margin-bottom: 8px; }
    .success-sub { font-size: 16px; color: var(--muted); line-height: 1.6; margin-bottom: 32px; }
    .success-detail { background: var(--teal-pale); border: 1px solid var(--teal-light); border-radius: 12px; padding: 20px 24px; text-align: left; margin-bottom: 24px; }
    .success-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; }
    .success-row-label { color: var(--muted); }
    .success-row-val { color: var(--teal-deep); font-weight: 500; }
    .stars { display: flex; gap: 8px; justify-content: center; margin: 16px 0; }
    .star { font-size: 36px; cursor: pointer; transition: transform 0.15s; filter: grayscale(1) opacity(0.4); }
    .star.active { filter: none; transform: scale(1.15); }
    .star:hover { transform: scale(1.2); }
    .magic-card { max-width: 440px; margin: 0 auto; }
    .error-msg { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; border-radius: 10px; padding: 12px 16px; font-size: 14px; margin-top: 12px; }

    /* STEP INDICATOR */
    .steps { display: flex; align-items: center; justify-content: center; gap: 0; margin-bottom: 32px; padding-top: 88px; }
    .step { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .step-dot { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); background: white; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--muted); transition: all 0.3s; }
    .step.active .step-dot { border-color: var(--teal); background: var(--teal); color: white; }
    .step.done .step-dot { border-color: var(--teal); background: var(--teal-pale); color: var(--teal); }
    .step-label { font-size: 11px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
    .step.active .step-label { color: var(--teal); }
    .step-line { width: 48px; height: 2px; background: var(--border); margin-bottom: 18px; transition: background 0.3s; }
    .step-line.done { background: var(--teal-light); }

    /* CONTENT SECTIONS */
    .content-section { padding: 80px 24px; }
    .alt-bg { background: var(--stone); }
    .section-inner { max-width: 860px; margin: 0 auto; }
    .section-inner.center-text { text-align: center; }
    .section-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--teal); margin-bottom: 12px; font-family: var(--sans); }
    .section-title { font-family: var(--display); font-size: clamp(26px, 4vw, 40px); color: var(--teal-deep); line-height: 1.15; margin-bottom: 20px; letter-spacing: 1.5px; }
    .section-body { font-size: 16px; color: var(--slate); line-height: 1.75; margin-bottom: 16px; max-width: 680px; font-weight: 400; }
    .callout-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-top: 40px; }
    .callout-item { background: white; border: 1px solid var(--border); border-radius: 16px; padding: 24px; display: flex; flex-direction: column; gap: 12px; }
    .callout-icon { font-size: 28px; }
    .callout-text { font-size: 14px; color: var(--slate); line-height: 1.6; }
    .steps-list { display: flex; flex-direction: column; gap: 32px; margin-top: 40px; }
    .step-item { display: flex; gap: 24px; align-items: flex-start; }
    .step-num { width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0; background: linear-gradient(135deg, var(--teal), var(--teal-dark)); color: white; font-family: var(--display); font-size: 20px; display: flex; align-items: center; justify-content: center; }
    .step-content { padding-top: 6px; }
    .step-heading { font-size: 18px; font-weight: 700; color: var(--teal-deep); margin-bottom: 8px; }
    .step-desc { font-size: 15px; color: var(--slate); line-height: 1.65; }
    .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-top: 32px; }
    .service-card { background: white; border: 1px solid var(--border); border-radius: 16px; padding: 20px; transition: all 0.2s; }
    .service-card:hover { border-color: var(--teal); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(58,112,127,0.1); }
    .service-icon { font-size: 24px; margin-bottom: 10px; }
    .service-name { font-size: 15px; font-weight: 700; color: var(--teal-deep); margin-bottom: 6px; }
    .service-desc { font-size: 13px; color: var(--muted); line-height: 1.5; }
    .specialty-note { margin-top: 28px; padding: 20px 24px; background: white; border: 1px solid var(--border); border-radius: 14px; font-size: 14px; color: var(--slate); line-height: 1.6; }
    .specialty-note a { color: var(--teal); text-decoration: none; font-weight: 600; }
    .pricing-card { max-width: 480px; margin: 40px auto 0; background: white; border: 1px solid var(--border); border-radius: 24px; padding: 40px; box-shadow: 0 8px 40px rgba(58,112,127,0.08); }
    .price-amount { font-family: var(--display); font-size: 64px; color: var(--teal-deep); line-height: 1; margin-bottom: 12px; }
    .price-unit { font-size: 28px; color: var(--muted); }
    .price-desc { font-size: 15px; color: var(--slate); margin-bottom: 24px; line-height: 1.5; }
    .price-features { display: flex; flex-direction: column; gap: 10px; text-align: left; }
    .price-feature { font-size: 14px; color: var(--slate); display: flex; gap: 8px; }

    /* TASK SELECTOR */
    .ts-row { display: flex; align-items: center; gap: 10px; padding: 13px 0; border-bottom: 1px solid var(--border); transition: opacity 0.2s; }
    .ts-row.inactive { opacity: 0.45; }
    .ts-checkbox { width: 20px; height: 20px; border-radius: 5px; border: 1.5px solid var(--border); background: white; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: background 0.15s, border-color 0.15s; }
    .ts-checkbox.checked { background: var(--teal); border-color: var(--teal); }
    .ts-checkmark { width: 11px; height: 8px; display: none; }
    .ts-checkbox.checked .ts-checkmark { display: block; }
    .ts-label { flex: 1; font-size: 15px; color: var(--ink); cursor: pointer; user-select: none; }
    .ts-stepper { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .ts-btn { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--border); background: white; color: var(--ink); font-size: 18px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.12s; font-family: var(--sans); }
    .ts-btn:hover:not(:disabled) { background: var(--stone); }
    .ts-btn:disabled { opacity: 0.25; cursor: default; }
    .ts-time { font-size: 14px; font-weight: 500; color: var(--ink); min-width: 46px; text-align: center; }
    .ts-total-bar { margin-top: 20px; background: var(--teal-pale); border: 1px solid var(--teal-light); border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; }
    .ts-total-label { font-size: 14px; color: var(--muted); }
    .ts-total-time { font-family: var(--display); font-size: 26px; color: var(--teal-deep); }
    .ts-total-breakdown { font-size: 12px; color: var(--teal); margin-top: 2px; text-align: right; }
    .proceed-btn { width: 100%; margin-top: 16px; background: var(--yellow); color: var(--ink); font-family: var(--sans); font-size: 15px; font-weight: 700; padding: 15px; border-radius: 100px; border: none; cursor: pointer; box-shadow: 0 6px 20px rgba(254,216,7,0.35); transition: all 0.25s; letter-spacing: 0.03em; }
    .proceed-btn:hover:not(:disabled) { transform: translateY(-1px); background: var(--yellow-dark); box-shadow: 0 8px 28px rgba(254,216,7,0.45); }
    .proceed-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* INSTRUCTIONS BRANCH */
    .branch-summary { background: var(--stone); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 24px; }
    .branch-summary-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
    .branch-summary-row { display: flex; justify-content: space-between; font-size: 14px; color: var(--slate); padding: 3px 0; }

function fmtTime(min) {

function fmtDuration(hrs) {

// ── CATEGORY DETAIL ──
function renderCatDetail() {
  const cats = selectedCats();
  const idx = state.instructionIdx;
  const cat = cats[idx];
  const total = cats.length;
  const pct = Math.round((idx / total) * 100);
  if (cat.id === 'cleaning') return renderCleaningDetail(idx, total, pct);
  if (cat.id === 'mealprep') return renderMealPrepDetail(idx, total, pct);
  if (cat.id === 'laundry')  return renderLaundryDetail(idx, total, pct);
  return renderGenericDetail(cat, idx, total, pct);
}

// ── CLEANING ROOMS ──
const CLEANING_ROOMS = [
  { id: 'kitchen',      label: 'Kitchen' },
  { id: 'bathrooms',    label: 'Bathrooms' },
  { id: 'living',       label: 'Living areas / office' },
  { id: 'bedrooms',     label: 'Bedrooms' },
  { id: 'garage',       label: 'Garage' },
];

function renderCleaningDetail(idx, total, pct) {
  const d = state.catDetails['cleaning'] || {};
  if (!state.cleaningRoom) return renderCleaningRoomPicker(idx, total, pct, d);
  // If kitchen selected but no mode chosen yet, show mode picker
  if (state.cleaningRoom === 'kitchen' && !state.kitchenMode) return renderKitchenModePicker(idx, total, pct, d);
  switch (state.cleaningRoom) {
    case 'kitchen':   return renderKitchenScreen(idx, total, pct, d);
    case 'bathrooms': return renderBathroomScreen(idx, total, pct, d);
    case 'living':    return renderLivingScreen(idx, total, pct, d);
    case 'bedrooms':  return renderBedroomsScreen(idx, total, pct, d);
    case 'garage':    return renderGarageScreen(idx, total, pct, d);
    default:          return renderGenericRoomScreen(state.cleaningRoom, idx, total, pct, d);
  }
}

// Shared UI helpers used by all room screens
function mkCheckbox(id, label, checked, onchange, indent=0) {
  const ml = indent ? `margin-left:${indent*20}px;` : '';
  const bt = indent ? 'none' : '1px solid var(--border)';
  return `<div class="cd-check-row" style="${ml}border-top:${bt};" onclick="${onchange}">
    <div class="ts-checkbox ${checked?'checked':''}" id="cb-${id}">
      <svg class="ts-checkmark" viewBox="0 0 11 8" fill="none"><polyline points="1,4 4,7 10,1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="cd-check-label">${label}</div>
  </div>`;
}
function mkRadio(id, label, checked, onchange, indent=0) {
  const ml = indent ? `margin-left:${indent*20}px;` : '';
  return `<div class="cd-check-row" style="${ml}border-top:none;" onclick="${onchange}">
    <div class="ts-checkbox ${checked?'checked':''}" id="rb-${id}" style="border-radius:50%;">
      <div style="width:8px;height:8px;border-radius:50%;background:white;${checked?'':'display:none'}"></div>
    </div>
    <div class="cd-check-label">${label}</div>
  </div>`;
}
function mkText(id, placeholder, val, onchange, indent=0) {
  const ml = indent ? `margin-left:${indent*20}px;` : '';
  const w  = indent ? `calc(100% - ${indent*20}px)` : '100%';
  return `<div class="mic-wrap" style="${ml}width:${w};">
    <input type="text" id="tf-${id}" placeholder="${placeholder}" value="${val||''}" oninput="${onchange}"
      style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:10px;font-family:var(--sans);font-size:14px;background:var(--stone);outline:none;color:var(--ink);display:block;" />
    ${mkMicBtn('tf-' + id)}
  </div>`;
}
function mkTextarea(id, placeholder, val, onchange, extraStyle='') {
  return `<div class="mic-ta-wrap" style="${extraStyle}">
    <textarea id="ta-${id}" placeholder="${placeholder}" oninput="${onchange}"
      style="width:100%;padding:9px 12px 9px 12px;border:1px solid var(--border);border-radius:10px;font-family:var(--sans);font-size:14px;background:var(--stone);outline:none;color:var(--ink);resize:vertical;min-height:80px;">${val||''}</textarea>
    ${mkMicBtn('ta-' + id)}
  </div>`;
}
function mkMicBtn(targetId) {
  return `<button type="button" class="mic-btn" id="mic-${targetId}" onclick="startVoice('${targetId}')" title="Voice input">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;color:var(--muted);">
      <rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/>
    </svg>
  </button>`;
}
function mkAccordion(id, label, checked, onchange, children, indent=0) {
  return mkCheckbox(id, label, checked, onchange, indent) +
    (checked ? `<div>${children}</div>` : '');
}

// Each section renders independently — called by renderKitchenSection(sectionId)
function kitchenSectionHtml(sectionId, k) {

    case 'dishes': {
      const d = k.dishes || {};
      return mkAccordion('dishes','Dishes', d.open, `setK('dishes.open',!getK('dishes.open'))`,
        mkAccordion('unload','Unload dishwasher', d.unload, `setK('dishes.unload',!getK('dishes.unload'))`,
          mkRadio('unload-counter','Unload to countertop', d.unloadMode==='counter', `setK('dishes.unloadMode','counter')`,2) +
          mkRadio('unload-away','Put away to cabinets & shelves', d.unloadMode==='away', `setK('dishes.unloadMode','away')`,2) +
          (d.unloadMode==='away' ?
            mkRadio('unsure-leave','Leave items out if unsure where they belong', d.unsureMode==='leave', `setK('dishes.unsureMode','leave')`,3) +
            mkRadio('unsure-find','Find homes for everything', d.unsureMode==='find', `setK('dishes.unsureMode','find')`,3)
          : ''),
        1) +
        mkAccordion('reload','Reload dishwasher', d.reload, `setK('dishes.reload',!getK('dishes.reload'))`,
          mkCheckbox('start-cycle','Start cycle after reloading', d.startCycle, `setK('dishes.startCycle',!getK('dishes.startCycle'))`,2) +
          (d.startCycle ?
            mkRadio('cycle-default','Use default cycle settings', d.cycleMode==='default', `setK('dishes.cycleMode','default')`,3) +
            mkRadio('cycle-custom','Custom settings', d.cycleMode==='custom', `setK('dishes.cycleMode','custom')`,3) +
            (d.cycleMode==='custom' ? mkText('cycle-custom-text','Describe cycle settings…', d.cycleCustom, `setK('dishes.cycleCustom',this.value)`,3) : '')
          : '') +
          mkCheckbox('add-detergent','Add detergent', d.addDetergent, `setK('dishes.addDetergent',!getK('dishes.addDetergent'))`,2) +
          (d.addDetergent ? mkText('detergent-loc','Detergent location & details…', d.detergentLoc, `setK('dishes.detergentLoc',this.value)`,3) : '') +
          mkCheckbox('add-rinse','Add rinse aid', d.addRinse, `setK('dishes.addRinse',!getK('dishes.addRinse'))`,2) +
          (d.addRinse ? mkText('rinse-loc','Rinse aid location & details…', d.rinseLoc, `setK('dishes.rinseLoc',this.value)`,3) : ''),
        1) +
        mkAccordion('handwash','Hand-wash items', d.handwash, `setK('dishes.handwash',!getK('dishes.handwash'))`,
          mkText('handwash-items',"List any items that aren't dishwasher safe…", d.handwashItems, `setK('dishes.handwashItems',this.value)`,2),
        1)
      ,0);
    }
    case 'sink': {
      const s = k.sink || {};
      return mkAccordion('sink','Sink', s.open, `setK('sink.open',!getK('sink.open'))`,
        mkRadio('sink-ignore','Ignore dirty dishes', s.mode==='ignore', `setK('sink.mode','ignore')`,1) +
        mkRadio('sink-wash','Wash / reload dishes according to instructions above', s.mode==='wash', `setK('sink.mode','wash')`,1),
      0);
    }
    case 'countertops': {
      const c = k.countertops || {};

        mkCheckbox('ctr-wipe','Wipe down and sanitize', c.wipe, `setK('countertops.wipe',!getK('countertops.wipe'))`,1) +
        mkAccordion('ctr-clutter','Clutter present', c.clutter, `setK('countertops.clutter',!getK('countertops.clutter'))`,
          mkRadio('clutter-leave','Leave as is', c.clutterMode==='leave', `setK('countertops.clutterMode','leave')`,2) +
          mkRadio('clutter-pile','Consolidate in a pile', c.clutterMode==='pile', `setK('countertops.clutterMode','pile')`,2) +
          (c.clutterMode==='pile' ?
            mkCheckbox('clutter-bins','Provide clear storage bins ($5/bin)', c.bins, `setK('countertops.bins',!getK('countertops.bins'))`,3) +
            (c.bins ? mkText('bins-detail','Quantity and any additional details…', c.binsDetail, `setK('countertops.binsDetail',this.value)`,4) : '')

          mkCheckbox(`${id}-int`,'Interior', x.interior, `setK('appliances.${id}.interior',!getK('appliances.${id}.interior'))`,2) +

      return mkAccordion('appliances','Appliances', a.open, `setK('appliances.open',!getK('appliances.open'))`,
        appInt('microwave','Microwave') +
        appInt('oven','Oven') +
        mkCheckbox('app-stove','Stove', a.stove, `setK('appliances.stove',!getK('appliances.stove'))`,1) +
        mkCheckbox('app-dishwasher','Dishwasher', a.dishwasher, `setK('appliances.dishwasher',!getK('appliances.dishwasher'))`,1) +
        fridgeHtml +
        mkAccordion('app-other','Other', oth.open, `setK('appliances.other.open',!getK('appliances.other.open'))`,
          mkText('other-app-text','Describe the appliance…', oth.text, `setK('appliances.other.text',this.value)`,2),

    }
    case 'windows': {
      const w = k.windows || {};
      return mkAccordion('windows','Windows', w.open, `setK('windows.open',!getK('windows.open'))`,

const KITCHEN_SECTIONS = ['dishes','sink','countertops','appliances','windows','floors','baseboards'];

function renderKitchenScreen(idx, total, pct, d) {
  if (state.kitchenMode === 'standard') return renderKitchenStandardScreen(idx, total, pct, d);
  return renderKitchenCustomScreen(idx, total, pct, d);
}

function renderKitchenCustomScreen(idx, total, pct, d) {
  const k = d.kitchen || {};
  const selectedRooms = d.rooms || [];
  const roomIdx = selectedRooms.indexOf('kitchen');
  const nextRoom = selectedRooms[roomIdx + 1];
  const sections = KITCHEN_SECTIONS.map(s =>
    `<div id="kitchen-section-${s}">${kitchenSectionHtml(s, k)}</div>`
  ).join('');

  return `${cdStepsHtml()}
    <div class="main">
      <div class="card">
        ${cdProgressHtml(idx, total, pct)}
        <div class="cd-category-label">Cleaning &amp; tidying</div>
        <div class="cd-title">Kitchen</div>
        ${sections}
        <div class="cd-nav" style="margin-top:20px;">
          <button class="cd-back-btn" onclick="roomScreenBack()">← Back</button>
          <button class="cd-next-btn" onclick="roomScreenNext()">${nextRoom ? 'Next room →' : 'Done with cleaning →'}</button>
        </div>
      </div>
    </div>`;
}

// ── BATHROOM SCREEN ──
function renderBathroomScreen(idx, total, pct, d) {
  const bathCount = d.bathCount || 1;
  const bathModes = d.bathModes || {};  // { 0: 'standard'|'custom', 1: ... }
  const selectedRooms = d.rooms || [];
  const roomIdx = selectedRooms.indexOf('bathrooms');
  const nextRoom = selectedRooms[roomIdx + 1];

  // Build per-bathroom sections
  let bathSections = '';
  for (let i = 0; i < bathCount; i++) {
    const loc = (d.bathLocations && d.bathLocations[i]) || '';
    const mode = bathModes[i];
    const label = loc ? `Bathroom ${i+1} — ${loc}` : `Bathroom ${i+1}`;
    bathSections += `<div id="bath-section-${i}" style="margin-top:16px;">
      ${renderBathSection(i, label, mode, d)}
    </div>`;
  }

  return `${cdStepsHtml()}
    <div class="main">
      <div class="card">
        ${cdProgressHtml(idx, total, pct)}
        <div class="cd-category-label">Cleaning &amp; tidying</div>
        <div class="cd-title">Bathrooms</div>
        <div class="cd-included" style="margin-bottom:20px;">
          <div class="cd-included-label">Standard reset includes</div>

// ── ROOM STATE HELPERS ──
window.getRoomVal = (roomId, key) => {
  return (state.catDetails['cleaning'] || {})[roomId]?.[key];
};
window.setRoom = (roomId, key, value) => {
  if (!state.catDetails['cleaning']) state.catDetails['cleaning'] = {};
  if (!state.catDetails['cleaning'][roomId]) state.catDetails['cleaning'][roomId] = {};
  state.catDetails['cleaning'][roomId][key] = value;
  // Find top-level section and re-render just that div
  const sectionMaps = {
    living:   LIVING_SECTIONS,
    bedrooms: BEDROOM_SECTIONS,
    garage:   GARAGE_SECTIONS,
  };
  const sectionFns = {
    living:   livingSectionHtml,
    bedrooms: bedroomSectionHtml,
    garage:   garageSectionHtml,
  };
  const sections = sectionMaps[roomId];
  const fn = sectionFns[roomId];
  if (!sections || !fn) return;
  const sectionId = sections.find(s => key === s || key.startsWith(s)) ||
    (key.startsWith('tidy') ? 'tidy' :
     key.startsWith('furn') || key === 'furniture' ? 'furniture' :
     key.startsWith('win') || key === 'windows' ? 'windows' :
     key.startsWith('floors') ? 'floors' :
     key === 'baseboards' ? 'baseboards' :
     key === 'surfaces' || key === 'surfacesDetail' ? 'surfaces' :
     key === 'cobwebs' ? 'cobwebs' : null);
  if (!sectionId) return;
  const el = document.getElementById(`${roomId}-section-${sectionId}`);
  if (el) el.innerHTML = fn(sectionId, state.catDetails['cleaning'][roomId]);
};

function renderGenericRoomScreen(roomId, idx, total, pct, d) {
  const roomLabel = CLEANING_ROOMS.find(r => r.id === roomId)?.label || roomId;
  const selectedRooms = d.rooms || [];
  const nextRoom = selectedRooms[selectedRooms.indexOf(roomId) + 1];
  return `${cdStepsHtml()}

// ── LAUNDRY STATE HELPERS ──
window.getLaundry = (path) => {
  const parts = path.split('.');
  let obj = state.catDetails['laundry'] || {};
  for (const p of parts) obj = obj?.[p];
  return obj;
};
window.setLaundry = (key, value) => {
  if (!state.catDetails['laundry']) state.catDetails['laundry'] = {};
  state.catDetails['laundry'][key] = value;
};
window.setLaundrySection = (section, key, value) => {
  if (!state.catDetails['laundry']) state.catDetails['laundry'] = {};
  if (!state.catDetails['laundry'][section]) state.catDetails['laundry'][section] = {};
  state.catDetails['laundry'][section][key] = value;
  // Re-render the affected section
  const d = state.catDetails['laundry'];
  const sectionFns = {
    collect: laundryCollectHtml,
    start:   laundryStartHtml,
    dryer:   laundryDryerHtml,
    putaway: laundryPutAwayHtml,
  };
  const el = document.getElementById('laundry-section-' + section);
  if (el && sectionFns[section]) el.innerHTML = sectionFns[section](d);
};

window.addLaundryPhoto = (groupId, section) => {
  const parts = groupId.split('-');
  const subKey = parts.slice(1).join('-') + 'Photos';
  const mainSection = parts[0];
  if (!state.catDetails['laundry']) state.catDetails['laundry'] = {};
  if (!state.catDetails['laundry'][mainSection]) state.catDetails['laundry'][mainSection] = {};
  const photos = state.catDetails['laundry'][mainSection][subKey] || [{ url: null, comment: '' }];
  photos.push({ url: null, comment: '' });
  state.catDetails['laundry'][mainSection][subKey] = photos;
  const container = document.getElementById('laundry-photos-' + groupId);
  if (container) container.innerHTML = laundryPhotoGroupHtml(groupId, photos, section).match(/id="laundry-photos-[^"]*"[^>]*>([\s\S]*)<\/div>/)?.[0] || '';
  // Re-render full group
  const d = state.catDetails['laundry'];
  const sectionFns = { collect: laundryCollectHtml, start: laundryStartHtml, dryer: laundryDryerHtml, putaway: laundryPutAwayHtml };
  const el = document.getElementById('laundry-section-' + mainSection);
  if (el && sectionFns[mainSection]) el.innerHTML = sectionFns[mainSection](d);
};

function reviewCatHtml(cat, catIdx) {
  const mins = state.taskTimes[cat.id] || 0;
  const d = state.catDetails[cat.id] || {};
  const items = reviewItemsForCat(cat, d);
  const hasItems = items.length > 0;

  return `<div style="border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:${hasItems ? '12px' : '0'};">
      <div>
        <div style="font-size:15px;font-weight:600;color:var(--teal-deep);">${cat.label}</div>
        <div style="font-size:13px;color:var(--teal);margin-top:2px;">${fmtTime(mins)}</div>
      </div>
      <button onclick="editCat(${catIdx})" style="background:none;border:none;color:var(--teal);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;text-decoration:underline;text-underline-offset:3px;flex-shrink:0;margin-left:12px;">Edit</button>
    </div>
    ${hasItems
      ? `<div style="display:flex;flex-direction:column;gap:4px;">${items.map(item => reviewItemHtml(item, 0)).join('')}</div>`
      : `<div style="font-size:13px;color:var(--muted);font-style:italic;">No instructions added. <button onclick="editCat(${catIdx})" style="background:none;border:none;color:var(--teal);font-family:var(--sans);font-size:13px;cursor:pointer;text-decoration:underline;font-style:normal;">Add instructions →</button></div>`
    }
  </div>`;
}

function reviewItemHtml(item, depth) {
  const indent = depth * 16;
  if (typeof item === 'string') {
    return `<div style="font-size:13px;color:var(--slate);padding:2px 0;margin-left:${indent}px;">
      <span style="color:var(--teal);margin-right:6px;">·</span>${item}
    </div>`;
  }
  if (item.label && item.children) {
    return `<div style="margin-left:${indent}px;">
      <div style="font-size:13px;font-weight:600;color:var(--slate);padding:3px 0;">${item.label}</div>
      ${item.children.map(c => reviewItemHtml(c, depth + 1)).join('')}
    </div>`;
  }
  return '';
}

function reviewItemsForCat(cat, d) {
  switch(cat.id) {
    case 'cleaning': return reviewCleaning(d);
    case 'mealprep': return reviewMealPrep(d);
    case 'laundry':  return d.notes ? [d.notes] : [];
    default:         return d.notes ? [d.notes] : [];
  }
}

// ── CLEANING REVIEW ──
function reviewCleaning(d) {
  const rooms = d.rooms || [];
  if (!rooms.length) return [];
  return rooms.map(roomId => {
    const label = CLEANING_ROOMS.find(r => r.id === roomId)?.label || roomId;
    const children = reviewRoomItems(roomId, d);
    return { label, children };
  });
}

function reviewRoomItems(roomId, d) {
  switch(roomId) {
    case 'kitchen':   return reviewKitchen(d);
    case 'bathrooms': return reviewBathrooms(d);
    case 'living':    return reviewRoomData('living', d, LIVING_SECTIONS);
    case 'bedrooms':  return reviewRoomData('bedrooms', d, BEDROOM_SECTIONS);
    case 'garage':    return reviewRoomData('garage', d, GARAGE_SECTIONS);
    default:          return [];
  }
}

function reviewKitchen(d) {
  const mode = state.kitchenMode;
  if (mode === 'standard') {
    const items = ['Unload and reload dishwasher', 'Clean and sanitize counters', 'Clean and sanitize sink', 'Clean and sanitize appliances (exterior)'];
    const notes = (d.kitchen || {}).standardNotes;
    if (notes) items.push(`Notes: ${notes}`);
    return [{ label: 'Standard kitchen reset', children: items.map(i => i) }];
  }
  const k = d.kitchen || {};
  const items = [];

  // Dishes
  const di = k.dishes || {};
  if (di.open) {
    const dishItems = [];
    if (di.unload) {
      const sub = di.unloadMode === 'counter' ? 'unload to countertop' : di.unloadMode === 'away' ? `put away to cabinets${di.unsureMode ? ' · if unsure: ' + (di.unsureMode === 'leave' ? 'leave out' : 'find a home') : ''}` : '';
      if (sub) dishItems.push('Unload dishwasher — ' + sub);
    }
    if (di.reload) {
      let reloadStr = 'Reload dishwasher';
      const parts = [];
      if (di.startCycle) parts.push('start cycle' + (di.cycleMode === 'custom' ? ` (${di.cycleCustom || 'custom'})` : ' (default settings)'));
      if (di.addDetergent) parts.push(`add detergent${di.detergentLoc ? ' (' + di.detergentLoc + ')' : ''}`);
      if (di.addRinse) parts.push(`add rinse aid${di.rinseLoc ? ' (' + di.rinseLoc + ')' : ''}`);
      if (parts.length) reloadStr += ' — ' + parts.join(', ');
      dishItems.push(reloadStr);
    }
    if (di.handwash && di.handwashItems) dishItems.push(`Hand wash: ${di.handwashItems}`);
    if (dishItems.length) items.push({ label: 'Dishes', children: dishItems });
  }

  // Sink
  const si = k.sink || {};
  if (si.open && si.mode) items.push(`Sink — ${si.mode === 'ignore' ? 'ignore dirty dishes' : 'wash/reload dishes per instructions'}`);

  // Countertops
  const ct = k.countertops || {};
  if (ct.open) {
    const ctItems = [];
    if (ct.wipe) ctItems.push('Wipe down and sanitize');
    if (ct.clutter) {
      let clutterStr = 'Clutter — ' + (ct.clutterMode === 'leave' ? 'leave as is' : 'consolidate into a pile');
      if (ct.clutterMode === 'pile' && ct.bins) clutterStr += ` · storage bins${ct.binsDetail ? ' (' + ct.binsDetail + ')' : ''}`;
      ctItems.push(clutterStr);
    }
    if (ctItems.length) items.push({ label: 'Countertops', children: ctItems });
  }

  // Appliances
  const ap = k.appliances || {};
  if (ap.open) {
    const apItems = [];
    ['microwave','oven'].forEach(id => {
      const a = ap[id] || {};
      if (a.open) {
        const parts = [];
        if (a.exterior) parts.push('exterior');
        if (a.interior) parts.push('interior');
        if (parts.length) apItems.push(`${id.charAt(0).toUpperCase()+id.slice(1)}: ${parts.join(', ')}${a.notes ? ' · ' + a.notes : ''}`);
      }
    });
    if (ap.stove) apItems.push('Stove: exterior');
    if (ap.dishwasher) apItems.push('Dishwasher: exterior');
    const fr = ap.fridge || {};
    if (fr.open) {
      const frParts = [];
      if (fr.exterior) frParts.push('exterior');
      if (fr.interior) {
        const intParts = [];
        if (fr.intFridge) intParts.push('refrigerator');
        if (fr.intFreezer) intParts.push('freezer');
        if (intParts.length) frParts.push('interior (' + intParts.join(', ') + ')');
      }
      if (frParts.length) apItems.push(`Refrigerator: ${frParts.join(', ')}`);
    }
    const oth = ap.other || {};
    if (oth.open && oth.text) apItems.push(`Other: ${oth.text}`);
    if (apItems.length) items.push({ label: 'Appliances', children: apItems });
  }

  // Windows
  const wi = k.windows || {};
  if (wi.open) {
    const wParts = [];
    if (wi.exterior) wParts.push('exterior');
    if (wi.interior) wParts.push('interior');
    if (wi.notes) wParts.push(wi.notes);
    if (wParts.length) items.push(`Windows — ${wParts.join(', ')}`);
  }

  // Floors
  const fl = k.floors || {};
  if (fl.open) {
    const fParts = [];
    if (fl.sweep) fParts.push('sweep');
    if (fl.vacuum) fParts.push('vacuum');
    if (fParts.length) items.push(`Floors — ${fParts.join(', ')}`);
  }

  if (k.baseboards) items.push('Baseboards');
  return items;
}

function reviewBathrooms(d) {
  const bathCount = d.bathCount || 1;
  const items = [];
  for (let i = 0; i < bathCount; i++) {
    const loc = (d.bathLocations && d.bathLocations[i]) || '';
    const label = loc ? `Bathroom ${i+1} — ${loc}` : `Bathroom ${i+1}`;
    const mode = (d.bathModes || {})[i];
    if (!mode) { items.push(label + ' — no instructions added'); continue; }
    if (mode === 'standard') {
      const notes = (d.bathNotes || {})[i];
      const children = ['Standard reset (toilet, fixtures, mirrors, trash)'];
      if (notes) children.push(`Notes: ${notes}`);
      items.push({ label, children });
      continue;
    }
    const b = (d.bathCustom || {})[i] || {};
    const taskItems = [];
    if (b.toilet)  taskItems.push('Toilet');
    if (b.sinks)   taskItems.push('Sinks');
    if (b.shower)  taskItems.push('Shower');
    if (b.tub)     taskItems.push('Tub');
    if (b.mirrors) taskItems.push('Mirrors');
    if (b.trash)   taskItems.push('Trash');
    if (b.towels) {
      const tParts = [];
      if (b.towelsRemove) {
        const rMode = b.towelsRemoveMode === 'all' ? 'remove all' : b.towelsRemoveMode === 'floor' ? 'remove from floor' : 'remove';
        tParts.push(rMode + (b.towelsRemoveLoc ? ' → ' + b.towelsRemoveLoc : ''));
      }
      if (b.towelsReplace) tParts.push('replace' + (b.towelsReplaceLoc ? ' from ' + b.towelsReplaceLoc : ''));
      taskItems.push('Towels' + (tParts.length ? ' — ' + tParts.join(', ') : ''));
    }
    if (b.bathmats) {
      const bParts = [];
      if (b.bathmatsRemove) bParts.push('remove' + (b.bathmatsRemoveLoc ? ' → ' + b.bathmatsRemoveLoc : ''));
      if (b.bathmatsReplace) bParts.push('replace' + (b.bathmatsReplaceLoc ? ' from ' + b.bathmatsReplaceLoc : ''));
      taskItems.push('Bathmats' + (bParts.length ? ' — ' + bParts.join(', ') : ''));
    }
    if (b.windows) {
      const wParts = [];
      if (b.winExt) wParts.push('exterior');
      if (b.winInt) wParts.push('interior');
      taskItems.push('Windows' + (wParts.length ? ' — ' + wParts.join(', ') : ''));
    }
    if (b.baseboards) taskItems.push('Baseboards');
    if (b.floors) {
      const fParts = [];
      if (b.floorsSweep) fParts.push('sweep');
      if (b.floorsVacuum) fParts.push('vacuum');
      taskItems.push('Floors' + (fParts.length ? ' — ' + fParts.join(', ') : ''));
    }
    items.push({ label, children: taskItems.length ? taskItems : ['No specific tasks selected'] });
  }
  return items;
}

function reviewRoomData(roomId, d, sections) {
  const r = d[roomId] || {};
  const items = [];
  if (r.tidy) {
    const tParts = [];
    if (r.tidyAway) tParts.push('put items away');
    if (r.tidyPile) tParts.push('consolidate into a pile');
    if (r.tidyOrg) {
      const cats = [];
      if (r.tidyOrgToys) cats.push("children's toys");
      if (r.tidyOrgClothes) cats.push('clothes');
      if (r.tidyOrgPapers) cats.push('papers');
      if (r.tidyOrgOther && r.tidyOrgOtherText) cats.push(r.tidyOrgOtherText);
      tParts.push('organize' + (cats.length ? ': ' + cats.join(', ') : ''));
    }
    if (r.tidyBins) tParts.push('storage bins' + (r.tidyBinsDetail ? ' (' + r.tidyBinsDetail + ')' : ''));
    if (tParts.length) items.push('Tidy — ' + tParts.join(', '));
  }
  if (r.furniture) {
    const fParts = [];
    if (roomId === 'bedrooms' && r.furnBeds) {
      const bParts = [];
      if (r.furnBedsMake) bParts.push('make bed');
      if (r.furnBedsRemove) {
        const linens = [];
        if (r.furnBedsSheets) linens.push('sheets');
        if (r.furnBedsMattress) linens.push('mattress cover');
        if (r.furnBedsPillows) linens.push('pillowcases');
        if (r.furnBedsBlanket) linens.push('blanket');
        if (r.furnBedsDuvet) linens.push('duvet cover');
        bParts.push('remove linens' + (linens.length ? ' (' + linens.join(', ') + ')' : '') + (r.furnBedsRemoveLoc ? ' → ' + r.furnBedsRemoveLoc : ''));
      }
      if (r.furnBedsReplace) bParts.push('replace linens' + (r.furnBedsReplaceLoc ? ' from ' + r.furnBedsReplaceLoc : ''));
      if (bParts.length) fParts.push('Beds: ' + bParts.join(', '));
    }
    if (r.furnDust) fParts.push(`Dust/wipe: ${r.furnDust}`);
    if (fParts.length) items.push({ label: 'Furniture', children: fParts });
  }
  if (r.windows) {
    const wParts = [];
    if (r.winExt) wParts.push('exterior');
    if (r.winInt) wParts.push('interior');
    if (r.winNotes) wParts.push(r.winNotes);
    if (wParts.length) items.push(`Windows — ${wParts.join(', ')}`);
  }
  if (r.floors) {
    const fParts = [];
    if (r.floorsSweep) fParts.push('sweep');
    if (r.floorsVacuum) fParts.push('vacuum');
    if (fParts.length) items.push(`Floors — ${fParts.join(', ')}`);
  }
  if (r.baseboards) items.push('Baseboards');
  // Garage specific
  if (r.surfaces) items.push('Wipe down surfaces' + (r.surfacesDetail ? ' — ' + r.surfacesDetail : ''));
  if (r.cobwebs) items.push('Cobwebs');
  return items;
}

// ── MEAL PREP REVIEW ──
function reviewMealPrep(d) {
  const items = [];
  if (d.overview) items.push(d.overview);
  if (d.leaveInKitchen) items.push('Will leave written instructions / recipes in the kitchen');
  if (d.recipeLinks && d.recipeLinks.some(l => l.trim())) {
    d.recipeLinks.filter(l => l.trim()).forEach(l => items.push(`Recipe: ${l}`));
  }
  if (d.ingredientLocations) items.push(`Ingredients: ${d.ingredientLocations}`);
  if (d.notes) items.push(`Notes: ${d.notes}`);
  return items;
}

window.adjustBaths = (delta) => {
  if (!state.catDetails['cleaning']) state.catDetails['cleaning'] = {};
  const d = state.catDetails['cleaning'];
  // Save any already-typed location values before touching the DOM
  document.querySelectorAll('#bath-location-fields .cd-location-row input').forEach((inp, i) => {
    if (!d.bathLocations) d.bathLocations = [];
    d.bathLocations[i] = inp.value;

  d.bathCount = Math.max(1, Math.min(8, (d.bathCount || 1) + delta));
  // Update stepper count and buttons
  const countEl = document.querySelector('.cd-count');
  if (countEl) countEl.textContent = d.bathCount;
  const btns = document.querySelectorAll('.cd-stepper-row .ts-btn');
  if (btns[0]) btns[0].disabled = d.bathCount <= 1;
  if (btns[1]) btns[1].disabled = d.bathCount >= 8;
  // Rebuild location fields
  const fieldsEl = document.getElementById('bath-location-fields');
  if (fieldsEl) {
    let html = '';
    for (let i = 0; i < d.bathCount; i++) {
      const val = (d.bathLocations && d.bathLocations[i]) || '';
      html += `<div class="cd-location-row">

  const card = document.querySelector('.card');
  if (card) {
    // Remove sections beyond new count
    for (let i = d.bathCount; i < 8; i++) {
      const el = document.getElementById('bath-section-' + i);

    }

// ── VOICE INPUT ──
let _voiceRecognition = null;
let _voiceActive = null;
window.startVoice = (targetId) => {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    alert('Voice input is not supported in this browser. Try Chrome or Safari.');
    return;
  }
  // If already recording this field, stop it
  if (_voiceActive === targetId && _voiceRecognition) {
    _voiceRecognition.stop();
    return;
  }
  // Stop any existing session
  if (_voiceRecognition) _voiceRecognition.stop();

  const btn = document.getElementById('mic-' + targetId);
  const field = document.getElementById(targetId);
  if (!field) return;

  const recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';
  _voiceRecognition = recognition;
  _voiceActive = targetId;

  const existingVal = field.value || '';
  let interim = '';

  recognition.onstart = () => {
    if (btn) btn.classList.add('recording');
  };
  recognition.onresult = (e) => {
    let final = '';
    interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    field.value = existingVal + (existingVal && final ? ' ' : '') + final + interim;
    field.dispatchEvent(new Event('input'));
  };
  recognition.onerror = () => {
    if (btn) btn.classList.remove('recording');
    _voiceActive = null;
    _voiceRecognition = null;
  };
  recognition.onend = () => {
    if (btn) btn.classList.remove('recording');
    _voiceActive = null;
    _voiceRecognition = null;
  };
  recognition.start();
};

          oninput="setMealPrep('recipeLinks[${i}]',this.value)"
          style="flex:1;padding:9px 12px;border:1px solid var(--border);border-radius:10px;font-family:var(--sans);font-size:14px;background:var(--stone);outline:none;color:var(--ink);" />
        ${links.length > 1 ? `<button onclick="removeMealPrepLink(${i})" style="width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:white;color:var(--muted);font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--sans);">×</button>` : ''}
      </div>`).join('');
  }
};
window.removeMealPrepLink = (i) => {
  if (!state.catDetails['mealprep']?.recipeLinks) return;
  state.catDetails['mealprep'].recipeLinks.splice(i, 1);
  if (state.catDetails['mealprep'].recipeLinks.length === 0) state.catDetails['mealprep'].recipeLinks = [''];
  const links = state.catDetails['mealprep'].recipeLinks;
  const container = document.getElementById('mp-recipe-links');
  if (container) {
    container.innerHTML = links.map((val, i) => `
      <div style="display:flex;gap:8px;margin-bottom:8px;align-items:center;">
        <input type="text" placeholder="Paste recipe URL…" value="${val}"
          oninput="setMealPrep('recipeLinks[${i}]',this.value)"
          style="flex:1;padding:9px 12px;border:1px solid var(--border);border-radius:10px;font-family:var(--sans);font-size:14px;background:var(--stone);outline:none;color:var(--ink);" />
        ${links.length > 1 ? `<button onclick="removeMealPrepLink(${i})" style="width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:white;color:var(--muted);font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--sans);">×</button>` : ''}
      </div>`).join('');
  }
};

// ── SAVE BOOKING FIELDS ──
// Call before any render() that happens while the booking form is visible,
// so typed values aren't lost when the form rebuilds.
function saveBookingFields() {
  if (state.screen !== 'book') return;
  const get = (id) => document.getElementById(id)?.value.trim() || '';
  if (get('name'))    state._savedName    = get('name');
  if (get('email'))   state._savedEmail   = get('email');
  if (get('phone'))   state._savedPhone   = get('phone');
  if (get('address')) state._savedAddress = get('address');
  if (get('notes'))   state.notes         = get('notes');
  const ad = get('access-details'); if (ad) state.accessDetails = ad;
  const pn = get('pet-notes');      if (pn) state.petNotes      = pn;
}

// Patch renderBook to restore saved field values into the customer object
// so the input value="" attributes get repopulated after a re-render.
function saveAndRender() {
  saveBookingFields();
  // Temporarily patch state.customer so renderBook picks up the saved values
  state.customer = {
    name:    state._savedName    || state.customer?.name    || '',
    email:   state._savedEmail   || state.customer?.email   || '',
    phone:   state._savedPhone   || state.customer?.phone   || '',
    address: state._savedAddress || state.customer?.address || '',
  };
  render();
}

// ── NAV ACTIONS ──
window.startBooking  = () => { state.screen = 'task-select'; render(); };
window.showMagicLink = () => { state.screen = 'magic'; render(); };
window.goToBook      = () => { state.screen = 'book'; render(); };
window.setPref       = (p) => { state.contactPref = p; if (state.screen === 'book') saveAndRender(); else render(); };
window.setDuration   = (d) => { state.duration = d; if (state.screen === 'book') saveAndRender(); else render(); };
window.setRating     = (r) => { state.rating = r; render(); };
window.setAccess     = (m) => { state.accessMethod = m; state.arrivalPreference = null; saveAndRender(); };
window.setArrival    = (p) => { state.arrivalPreference = p; saveAndRender(); };
window.setPets       = (v) => { state.hasPets = v; saveAndRender(); };
window.applyPromo    = applyPromo;
window.goToRate      = () => { state.screen = 'rate'; render(); };

window.goToPayment = () => {
  saveBookingFields();
  const name    = document.getElementById('name')?.value.trim()    || state._savedName    || '';
  const email   = document.getElementById('email')?.value.trim()   || state._savedEmail   || '';
  const address = document.getElementById('address')?.value.trim() || state._savedAddress || '';
  const errEl   = document.getElementById('book-error');
  if (!name || !email || !address) { errEl.innerHTML = '<div class="error-msg">Please fill in your name, email, and address.</div>'; return; }
  if (!state.date)  { errEl.innerHTML = '<div class="error-msg">Please select a date.</div>'; return; }
  if (!state.time)  { errEl.innerHTML = '<div class="error-msg">Please select a start time.</div>'; return; }
  if (!state.accessMethod) { errEl.innerHTML = '<div class="error-msg">Please let us know how your HomeDasher should access your home.</div>'; return; }
  if ((state.accessMethod === 'someone_home' || state.accessMethod === 'buzzer') && !state.arrivalPreference) { errEl.innerHTML = '<div class="error-msg">Please let us know how your HomeDasher should announce their arrival.</div>'; return; }
  if (state.hasPets === null) { errEl.innerHTML = '<div class="error-msg">Please let us know if you have any pets.</div>'; return; }
  state.accessDetails = document.getElementById('access-details')?.value.trim() || state.accessDetails;
  state.petNotes = document.getElementById('pet-notes')?.value.trim() || state.petNotes;
  state.notes = document.getElementById('notes')?.value.trim() || '';
  state.bookingDetails = { name, email, phone: document.getElementById('phone')?.value.trim(), address, date: state.date, time: state.time, notes: state.notes };
  state.screen = 'payment';
  render();
};

window.submitPayment = async () => {
  const btn = document.getElementById('pay-btn');
  const btnText = document.getElementById('pay-btn-text');
  const errEl = document.getElementById('pay-error');
  btn.disabled = true;
  btnText.textContent = 'Processing…';
  try {
    const { paymentMethod, error } = await stripe.createPaymentMethod({ type: 'card', card: cardElement, billing_details: { name: state.bookingDetails.name, email: state.bookingDetails.email } });
    if (error) {
      document.getElementById('stripe-error').textContent = error.message;
      document.getElementById('stripe-error').style.display = 'block';
      btn.disabled = false;
      btnText.textContent = `Pay $${state.duration * HOURLY_RATE} & confirm booking`;
      return;
    }
    const res = await fetch('/api/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ...state.bookingDetails, taskTimes: state.taskTimes, catDetails: state.catDetails, contactPreference: state.contactPref, duration: state.duration, paymentMethodId: paymentMethod.id, promoCode: state.promoCode || null, referralCode: state.referralCode || null, accessMethod: state.accessMethod || null, arrivalPreference: state.arrivalPreference || null, accessDetails: state.accessDetails || null, hasPets: state.hasPets || false, petNotes: state.petNotes || null }),
    });
    const data = await res.json();
    if (!res.ok) { errEl.innerHTML = `<div class="error-msg">${data.error || 'Payment failed. Please try again.'}</div>`; btn.disabled = false; btnText.textContent = `Pay $${state.duration * HOURLY_RATE} & confirm booking`; return; }
    state.booking = data;
    state.screen = 'success';
    render();
  } catch (err) {
    errEl.innerHTML = '<div class="error-msg">Something went wrong. Please try again.</div>';
    btn.disabled = false;
    btnText.textContent = `Pay $${state.duration * HOURLY_RATE} & confirm booking`;
  }
};

window.submitRating = async () => {
  if (!state.rating) return;
  const feedback = document.getElementById('feedback')?.value || '';
  try {
    await fetch('/api/rate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ bookingId: state.booking?.bookingId, rating: state.rating, feedback }) });
    document.querySelector('.card').innerHTML = `<div style="text-align:center;padding:20px 0"><div style="font-size:48px;margin-bottom:16px">${state.rating >= 4 ? '🌟' : '🙏'}</div><div class="card-title">${state.rating >= 4 ? 'Thank you so much!' : 'Thank you for the feedback'}</div><p style="color:var(--muted);margin-top:8px">${state.rating >= 4 ? "We're so glad you had a great experience!" : 'We appreciate your honesty and will use this to improve.'}</p><br><button style="margin-top:16px;background:none;border:none;color:var(--teal);cursor:pointer;font-family:var(--sans);font-size:14px;font-weight:500;text-decoration:underline" onclick="startBooking()">Book again</button></div>`;
  } catch(e) {}
};

window.sendMagicLink = async () => {
  const email = document.getElementById('magic-email')?.value.trim();
  const phone = document.getElementById('magic-phone')?.value.trim();
  const msg = document.getElementById('magic-msg');
  if (!email && !phone) { msg.innerHTML = '<div class="error-msg">Please enter your email or phone number.</div>'; return; }
  try {
    await fetch('/api/magic-link', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, phone, preference: state.contactPref }) });
    msg.innerHTML = `<div class="promo-success" style="margin-top:16px;font-size:15px">✓ Link sent! Check your ${state.contactPref === 'sms' ? 'texts' : 'email'}.</div>`;
  } catch(e) { msg.innerHTML = '<div class="error-msg">Something went wrong. Please try again.</div>'; }
};

// ── MAGIC LINK TOKEN CHECK ──
async function checkMagicToken() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  if (!token) return;
  try {
    const res = await fetch(`/api/verify?token=${token}`);
    const data = await res.json();
    if (data.customer) { state.customer = data.customer; state.screen = 'task-select'; window.history.replaceState({}, '', '/app'); render(); }
  } catch(e) {}
}

// ── CALENDAR ──
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function renderCalendar() {
  const year = state.calYear, month = state.calMonth;
  const today = new Date(); today.setHours(0,0,0,0);
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const dayLabels = DAYS.map(d => `<div class="cal-day-label">${d}</div>`).join('');
  let cells = '';
  for (let i = 0; i < firstDay; i++) cells += `<div class="cal-day empty"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const thisDate = new Date(year, month, d);
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const disabled = thisDate < today || thisDate.getDay() === 0 || thisDate.getDay() === 6;
    const cls = `cal-day ${thisDate.getTime() === today.getTime() ? 'today' : ''} ${disabled ? 'disabled' : ''} ${state.date === dateStr ? 'selected' : ''}`.trim();
    cells += `<div class="${cls}" ${!disabled ? `onclick="selectDate('${dateStr}')"` : ''}>${d}</div>`;
  }
  return `<label style="font-size:13px;font-weight:500;color:var(--slate);display:block;margin-bottom:10px">Select a date</label>
    <div style="background:var(--stone);border:1px solid var(--border);border-radius:12px;padding:16px">
      <div class="cal-header">
        <button class="cal-nav" onclick="calNav(-1)">‹</button>
        <div class="cal-month">${MONTHS[month]} ${year}</div>
        <button class="cal-nav" onclick="calNav(1)">›</button>
      </div>
      <div class="cal-grid">${dayLabels}${cells}</div>
    </div>`;
}

function formatDateShort(d) {
  if (!d) return '';
  return new Date(d + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}
function formatDate(date, time) {
  if (!date) return '';
  return new Date(`${date}T${time}`).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', hour: 'numeric', minute: '2-digit' });
}

window.calNav = (dir) => {
  state.calMonth += dir;
  if (state.calMonth > 11) { state.calMonth = 0; state.calYear++; }
  if (state.calMonth < 0)  { state.calMonth = 11; state.calYear--; }
  const w = document.getElementById('calendar-widget');
  if (w) w.innerHTML = renderCalendar();
};

window.selectDate = async (dateStr) => {
  state.date = dateStr; state.time = null;
  const w = document.getElementById('calendar-widget');
  if (w) w.innerHTML = renderCalendar();
  const sf = document.getElementById('time-slots-field');
  if (sf) { sf.style.display = ''; sf.querySelector('label').innerHTML = `Available start times · <span style="color:var(--teal)">${formatDateShort(dateStr)}</span>`; sf.querySelector('#time-slots').innerHTML = '<div style="color:var(--muted);font-size:14px">Loading available times…</div>'; }
  try {
    const res = await fetch(`/api/availability?date=${dateStr}&duration=${state.duration}`);
    const data = await res.json();
    const slotsEl = document.getElementById('time-slots');
    if (!slotsEl) return;
    if (!data.slots || data.slots.length === 0) { slotsEl.innerHTML = '<div class="no-slots">No available times on this date. Please try another day.</div>'; return; }
    slotsEl.innerHTML = `<div class="time-slots-grid">${data.slots.map(s => `<button class="time-slot ${state.time === s.value ? 'selected' : ''}" onclick="selectTime('${s.value}')">${s.display}</button>`).join('')}</div>`;
  } catch (err) {
    const slotsEl = document.getElementById('time-slots');
    if (slotsEl) slotsEl.innerHTML = '<div class="no-slots">Couldn\'t load times. Please try again.</div>';
  }
};

window.selectTime = (value) => {
  state.time = value;
  document.querySelectorAll('.time-slot').forEach(el => el.classList.remove('selected'));
  event.target.classList.add('selected');
};

// ── MOBILE NAV ──
window.toggleMobileNav = () => { document.getElementById('main-nav')?.classList.toggle('open'); };
document.addEventListener('click', (e) => {
  const nav = document.getElementById('main-nav'), hb = document.getElementById('nav-hamburger');
  if (nav && hb && !nav.contains(e.target) && !hb.contains(e.target)) nav.classList.remove('open');
});

// ── INIT ──
checkMagicToken();
render();
</script>
